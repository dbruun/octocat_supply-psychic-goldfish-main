name: 🧪 CI - Java API - Build, Test and Lint
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  java-api:
    name: Build and Test Java API
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Setup Java 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'
        cache-dependency-path: 'api/pom.xml'

    - name: Build Java API
      id: build-java
      if: always()
      working-directory: api
      run: ./mvnw clean compile -DskipTests
      
    - name: Run Java API Tests
      id: tests-java
      if: always()
      working-directory: api
      run: ./mvnw test
      
    - name: Package Java API
      id: package-java
      if: always() && steps.build-java.outcome == 'success'
      working-directory: api
      run: ./mvnw package -DskipTests

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports-java
        path: |
          api/target/surefire-reports/
        retention-days: 30
        if-no-files-found: ignore

    - name: Generate Test Summary
      if: always() && steps.tests-java.outcome == 'success'
      working-directory: api
      run: |
        echo "## Java API Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ All tests passed successfully" >> $GITHUB_STEP_SUMMARY

  frontend:
    name: Build and Lint Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Setup Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    
    - name: Install Node.js dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Lint Frontend
      id: lint-frontend
      if: always()
      working-directory: frontend
      run: npm run lint
    
    - name: Build Frontend
      id: build-frontend
      if: always()
      working-directory: frontend
      run: npm run build
