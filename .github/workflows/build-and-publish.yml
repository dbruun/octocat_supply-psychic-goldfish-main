name: 🐳 Build and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_api:
    name: Build API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    if: |
      github.actor != 'dependabot[bot]' && 
      !startsWith(github.head_ref, 'dependabot/')
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build-push.outputs.digest }}
      name: api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: ./api
          file: ./api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/api
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  build_frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    if: |
      github.actor != 'dependabot[bot]' && 
      !startsWith(github.head_ref, 'dependabot/')
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build-push.outputs.digest }}
      name: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/frontend
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

  trigger_deploy:
    name: Trigger Deployment
    permissions:
      actions: write
    needs: [build_api, build_frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger deployment workflow
        uses: actions/github-script@v9.0.0
        env:
          API_IMAGE: ${{ needs.build_api.outputs.image }}
          API_DIGEST: ${{ needs.build_api.outputs.digest }}
          API_NAME: ${{ needs.build_api.outputs.name }}
          FRONTEND_IMAGE: ${{ needs.build_frontend.outputs.image }}
          FRONTEND_DIGEST: ${{ needs.build_frontend.outputs.digest }}
          FRONTEND_NAME: ${{ needs.build_frontend.outputs.name }}
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                'api_image': process.env.API_IMAGE,
                'api_digest': process.env.API_DIGEST,
                'api_name': process.env.API_NAME,
                'frontend_image': process.env.FRONTEND_IMAGE,
                'frontend_digest': process.env.FRONTEND_DIGEST,
                'frontend_name': process.env.FRONTEND_NAME
              }
            });
